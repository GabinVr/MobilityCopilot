
name: Remote Deployment
on:
  push:
    branches: [ action/deploy ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key permissions
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 159.203.37.57 >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: 159.203.37.57
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          key_path: ~/.ssh/deploy_key
          script: |
            cd /home/deploy/hackathon
            git pull origin main
            # Add build or restart commands here (e.g., npm install, pm2 restart)

user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:1337;
    }

    upstream web {
        server web-app:3000;
    }

    # Redirection HTTP → HTTPS
    server {
        listen 80;
        server_name mobility-copilot.sandbag.ch;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name mobility-copilot.sandbag.ch;

        ssl_certificate /etc/letsencrypt/live/mobility-copilot.sandbag.ch/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mobility-copilot.sandbag.ch/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # API routes
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }

        # Frontend (tout le reste)
        location / {
            proxy_pass http://web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
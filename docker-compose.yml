version: '3.8'

networks:
  mobility:
    driver: bridge

volumes:
  chromadb_data:
    driver: local
  sqlite_data:
    driver: local

services:
  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:1.5.1
    container_name: mobility_chromadb
    networks:
      - mobility
    volumes:
      - ./chromadb:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=${ANONYMIZED_TELEMETRY:-FALSE}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobility_api
    networks:
      - mobility
    ports:
      - 8000:8000
    volumes:
      - ./data/db:/app/data/db  # SQLite database
      - ./chromadb:/app/chromadb  # ChromaDB data (shared with chromadb service)
      - ./core:/app/core
      - ./data:/app/data
      - ./rag:/app/rag
      - ./utils:/app/utils
    env_file: 
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ALLOWED_ORIGINS=http://localhost:3000,http://web-app:3000
      - DATABASE_URL=sqlite:///./data/db/mobility.db
      # Add other environment variables as needed
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Bun Web Application Frontend
  web-app:
    build:
      context: ./view
      dockerfile: Dockerfile
    container_name: mobility_web
    networks:
      - mobility
    ports:
      - 3000:3000
    env_file: 
      - ./view/.env
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=http://api:1337
      - ALLOWED_ORIGINS=http://localhost:3000,http://web-app:3000
      # Add other environment variables as needed
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s


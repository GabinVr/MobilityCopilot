networks:
  mobility:
    driver: bridge

volumes:
  chromadb_data:
    driver: local
  sqlite_data:
    driver: local
  huggingface_cache:
    driver: local

services:
  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:1.5.1
    volumes:
      - ./chromadb:/data
    networks:
      - mobility
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobility_api
    networks:
      - mobility
    volumes:
      - ./data/db:/app/data/db  # SQLite database
      - ./chromadb:/app/chromadb  # ChromaDB data (shared with chromadb service)
      - huggingface_cache:/app/.cache/huggingface  # HuggingFace models cache
      - ./core:/app/core
      - ./data:/app/data
      - ./rag:/app/rag
      - ./utils:/app/utils
    env_file: 
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ALLOWED_ORIGINS=http://localhost:3000,http://web-app:3000
      - DATABASE_URL=sqlite:///./data/db/mobility.db
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # 311 CSV monitor: checks for updates 10 times/day
  requetes311-watcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: requetes311_watcher
    networks:
      - mobility
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - REQUETES311_URL=https://donnees.montreal.ca/dataset/5866f832-676d-4b07-be6a-e99c21eb17e4/resource/2cfa0e06-9be4-49a6-b7f1-ee9f2363a872/download/requetes311.csv
      - REQUETES311_TARGET_FILE=/app/data/csv/requetes311.csv
      - REQUETES311_STATE_FILE=/app/data/db/requetes311_monitor_state.json
      - REQUETES311_CHECKS_PER_DAY=10
      - REQUETES311_TIMEOUT_SECONDS=120
      - REQUETES311_LOG_LEVEL=INFO
    command: ["python", "data/requetes311_monitor.py"]
    restart: unless-stopped

  web-app:
    build:
      context: ./view
      dockerfile: Dockerfile
    container_name: mobility_web
    networks:
      - mobility
    ports:
      - 3000:3000
    env_file: 
      - ./view/.env
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=http://api:1337
      - ALLOWED_ORIGINS=http://localhost:3000,http://web-app:3000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  mobilitycopilot_net:
    external: true
    name: mobilitycopilot_net

volumes:
  chromadb_data:
    driver: local
  sqlite_data:
    driver: local
  huggingface_cache:
    driver: local

services:
  # Redis for caching
  cache:
    image: redis:8.6.1
    networks:
      - mobilitycopilot_net
    volumes:
      - ./cache:/data
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    
  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:1.5.1
    volumes:
      - ./chromadb:/data
    networks:
      - mobilitycopilot_net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobility_api
    networks:
      - mobilitycopilot_net
    volumes:
      - ./data/db:/app/data/db  # SQLite database
      - ./chromadb:/app/chromadb  # ChromaDB data (shared with chromadb service)
      - huggingface_cache:/app/.cache/huggingface  # HuggingFace models cache
      - ./core:/app/core
      - ./data:/app/data
      - ./rag:/app/rag
      - ./utils:/app/utils
      - ./.reports:/app/.reports
    env_file: 
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - DATABASE_URL=sqlite:///./data/db/mobility.db
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  web-app:
    build:
      context: ./view
      dockerfile: Dockerfile
    container_name: mobility_web
    networks:
      - mobilitycopilot_net
    ports:
      - 3000:3000
    env_file: 
      - ./view/.env
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=http://api:1337
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

